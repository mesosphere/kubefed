---
kind: ConfigMap
apiVersion: v1
metadata:
  name: "{{ .Release.Name }}-kubefed-config-hook"
  namespace: "{{ .Release.Namespace }}"
  annotations:
    "helm.sh/hook": post-install, post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
data:
  setup.sh: |-
    #!/bin/bash
    set -euo pipefail

    NAMESPACE="{{ .Release.Namespace }}"
    MAX_RETRIES=30
    RETRY_INTERVAL=10

    echo "Waiting for kubefedconfig resource to be available..."
    
    # Wait for kubefedconfig to exist
    for i in $(seq 1 $MAX_RETRIES); do
      if kubectl get kubefedconfig -n "$NAMESPACE" kubefed &>/dev/null; then
        echo "kubefedconfig found!"
        break
      fi
      if [ $i -eq $MAX_RETRIES ]; then
        echo "ERROR: Timed out waiting for kubefedconfig to exist"
        exit 1
      fi
      echo "Waiting for kubefedconfig... (attempt $i/$MAX_RETRIES)"
      sleep $RETRY_INTERVAL
    done

    # Wait for controller-manager deployment to exist
    echo "Waiting for kubefed-controller-manager deployment to be available..."
    for i in $(seq 1 $MAX_RETRIES); do
      if kubectl get deployment kubefed-controller-manager -n "$NAMESPACE" &>/dev/null; then
        echo "kubefed-controller-manager deployment found!"
        break
      fi
      if [ $i -eq $MAX_RETRIES ]; then
        echo "ERROR: Timed out waiting for kubefed-controller-manager deployment to exist"
        exit 1
      fi
      echo "Waiting for deployment... (attempt $i/$MAX_RETRIES)"
      sleep $RETRY_INTERVAL
    done

    # Patch kubefedconfig with retries
    echo "Patching kubefedconfig..."
    for i in $(seq 1 5); do
      if kubectl patch kubefedconfig -n "$NAMESPACE" kubefed --type='json' -p='[{"op": "add", "path": "/spec/featureGates", "value":[{"configuration": {{ .Values.featureGates.PushReconciler | default "Enabled" | quote }},"name":"PushReconciler"},{"configuration": {{ .Values.featureGates.RawResourceStatusCollection | default "Disabled" | quote }},"name":"RawResourceStatusCollection"},{"configuration": {{ .Values.featureGates.SchedulerPreferences | default "Enabled" | quote }},"name":"SchedulerPreferences"}]}]'; then
        echo "Kubefedconfig patched successfully!"
        break
      fi
      if [ $i -eq 5 ]; then
        echo "ERROR: Failed to patch kubefedconfig after 5 attempts"
        exit 1
      fi
      echo "Patch failed, retrying... (attempt $i/5)"
      sleep 5
    done

    # Restart controller-manager deployment
    echo "Restarting kubefed-controller-manager..."
    kubectl rollout restart deployment/kubefed-controller-manager -n "$NAMESPACE"
    
    echo "Post-install hook completed successfully!"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-{{ randAlphaNum 10 | lower }}"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-4"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  template:
    metadata:
      name: "{{ .Release.Name }}"
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}
      nodeSelector:
        {{- toYaml .Values.commonNodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.commonTolerations | nindent 8 }}
      restartPolicy: Never
      serviceAccountName: kubefed-config-hook
      automountServiceAccountToken: true
      {{- if .Values.global.priorityClassName }}
      priorityClassName: "{{ .Values.global.priorityClassName }}"
      {{- end }}
      containers:
      - name: post-install-job
        image: "{{ .Values.postInstallJob.repository }}/{{ .Values.postInstallJob.image }}:{{ .Values.postInstallJob.tag }}"
        imagePullPolicy: "{{ .Values.postInstallJob.imagePullPolicy }}"
        command: ["/bin/bash"]
        args: ["/opt/scripts/setup.sh"]
        volumeMounts:
        - name: "scripts"
          mountPath: "/opt/scripts"
      volumes:
      - name: "scripts"
        configMap:
          name: "{{ .Release.Name }}-kubefed-config-hook"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubefed-config-hook
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install, post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch","get"]
  - apiGroups: ["core.kubefed.io"]
    resources: ["kubefedconfigs"]
    verbs: ["patch","get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubefed-config-hook
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install, post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubefed-config-hook
subjects:
  - kind: ServiceAccount
    name: kubefed-config-hook
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubefed-config-hook
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install, post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
